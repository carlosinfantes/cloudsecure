name: Publish Prowler Image to Docker Hub

on:
  push:
    tags:
      - "prowler-v*"

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push Prowler image
    runs-on: ubuntu-latest
    environment: Docker Hub
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#prowler-v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: lambdas/prowler_scanner
          platforms: linux/amd64
          push: true
          tags: |
            carlosinfantes/cloudsecure-prowler:latest
            carlosinfantes/cloudsecure-prowler:${{ steps.version.outputs.version }}
