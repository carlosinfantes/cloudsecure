name: Bug Report
description: Report a bug in CloudSecure
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CloudSecure version
      description: Output of `cloudsecure --version`
      placeholder: "0.1.0"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant error output here.
      render: shell
