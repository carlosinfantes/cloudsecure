# CloudSecure - Pre-commit hooks for automated code quality and secret detection
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents', '--unsafe']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  # Gitleaks - secret scanning on every commit
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  # Custom blockers for project-specific sensitive data
  - repo: local
    hooks:
      - id: block-aws-account-ids
        name: Block real AWS account IDs
        language: pygrep
        types: [text]
        entry: '(?<!\d)\b(?!123456789012\b)\d{12}\b(?!\d)'
        exclude: >
          (?x)^(
            package-lock\.json|
            infrastructure/package-lock\.json
          )$

      - id: block-sensitive-emails
        name: Block internal email addresses
        language: pygrep
        types: [text]
        entry: '[a-zA-Z0-9._%+-]+@unicc\.org'
        exclude: \.pre-commit-config\.yaml$

      - id: block-org-name
        name: Block internal org name
        language: pygrep
        types: [text]
        entry: '(?i)\bUNICC\b'
        exclude: \.pre-commit-config\.yaml$

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: ['--fix']
        files: '^lambdas/'
      - id: ruff-format
        files: '^lambdas/'
